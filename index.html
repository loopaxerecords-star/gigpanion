<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mixpanion Ultimate</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background: linear-gradient(-45deg, #0f0c29, #302b63, #240b36, #0f0c29); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #fff; font-family: 'Inter', system-ui, sans-serif; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        .hidden { display: none !important; }
        canvas { width: 100%; height: 160px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px solid rgba(0, 255, 255, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24">
    
    <header class="p-4 glass mx-4 mt-4 mb-2 flex justify-between items-center relative z-10">
        <h1 class="text-2xl font-bold neon-text flex items-center gap-2"><i class="ph ph-waveform"></i> Mixpanion</h1>
        <div class="flex gap-3 items-center">
            <input type="number" id="bpm-input" value="120" class="w-16 bg-transparent border-b border-cyan-400 text-center text-cyan-400 font-bold focus:outline-none">
            <button id="tap-btn" class="text-xs bg-fuchsia-600 px-3 py-1 rounded font-bold">TAP</button>
        </div>
    </header>

    <main class="flex-grow px-4 overflow-y-auto">
        <canvas id="visualizer" class="mb-4"></canvas>
        <div class="flex justify-between px-2 text-xs font-bold mb-6">
            <span class="text-cyan-400" id="live-lufs">-∞ LUFS</span>
            <span class="text-fuchsia-400" id="live-peak">-∞ dBTP</span>
        </div>

        <section id="tab-mix-lab" class="glass p-5 space-y-4">
            <h2 class="text-xl font-bold text-emerald-400 flex items-center gap-2"><i class="ph ph-upload-simple"></i> Mix Lab</h2>
            <button onclick="document.getElementById('fileInput').click()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold shadow-[0_0_15px_rgba(16,185,129,0.3)]">Upload Your Mix</button>
            <input type="file" id="fileInput" class="hidden" accept="audio/*">
            <p id="fileStatus" class="text-xs text-gray-400 text-center">No file loaded.</p>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full glass p-3 flex justify-around items-center z-50">
        <button id="bridge-btn" class="flex flex-col items-center text-gray-500" onclick="connectBridge()">
            <i class="ph ph-plugs-connected text-2xl"></i><span class="text-[10px]">Python Bridge</span>
        </button>
    </nav>

    <script>
        // --- Web Audio & Analyzer Setup ---
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        
        // --- Python Bridge Logic ---
        let socket;
        function connectBridge() {
            socket = new WebSocket('ws://localhost:8080');
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                document.getElementById('live-lufs').innerText = `${data.lufs.toFixed(1)} LUFS`;
                document.getElementById('live-peak').innerText = `${data.peak.toFixed(1)} dBTP`;
                draw(data.fft);
            };
            document.getElementById('bridge-btn').classList.add('text-emerald-400');
        }

        // --- File Upload Logic ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('fileStatus').innerText = `Playing: ${file.name}`;
            
            // Close Bridge if active
            if(socket) socket.close();

            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            source.start(0);

            // Analysis Loop
            function animate() {
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(dataArray);
                draw(Array.from(dataArray));
                requestAnimationFrame(animate);
            }
            animate();
        });

        function draw(freqData) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / freqData.length) * 2.5;
            let x = 0;
            freqData.forEach((val) => {
                const barHeight = val / 2;
                ctx.fillStyle = `rgb(${val}, 100, 255)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 2;
            });
        }
    </script>
</body>
</html>
